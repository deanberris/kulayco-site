title: Kulay
tagline: Claim territory by walking
description: Walk a loop. Your trail draws on the map. Close it — and the block is yours. Kulay is an iOS game where walking is the only input.
url: "https://kulay.co"

# Tally.so waitlist form ID (the part after tally.so/r/ in the form URL).
# Create the form at tally.so with fields: email (required), city (optional),
# "Would you walk 30 min/day for a game?" (optional). In Tally's form
# settings, set the submit button colour to #FF6B4A and background to
# transparent so it matches the site palette.
tally_form_id: aQj9aq

# Getwaitlist.com waitlist ID (find it in your Getwaitlist dashboard).
# After creating a waitlist at getwaitlist.com, configure the Tally form's
# "redirect after submit" URL to: https://kulay.co/thankyou.html?email={email}
# (use Tally's {email} variable to pre-fill the Getwaitlist widget).
getwaitlist_id: REPLACE_WITH_GETWAITLIST_ID

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .beads
  - .runtime
  - .claude
  - .logs
  - vendor
